version: "3.9"

services:
  voicegen:
    build: .
    env_file: .env
    volumes:
      - audio_temp:/app/temp
    restart: unless-stopped

  # Раздаёт сгенерированные файлы внутри Netbird-сети.
  # Доступен только пирам в той же Netbird-сети (привязан к wt0).
  file-server:
    image: nginx:alpine
    volumes:
      - audio_temp:/usr/share/nginx/html:ro
      - ./nginx/file-server.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NETBIRD_IP:-127.0.0.1}:${FILE_SERVER_PORT:-8888}:80"
    restart: unless-stopped

volumes:
  audio_temp:
